name: Archive Claude Status

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch incidents
        run: |
          mkdir -p data/snapshots
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          curl -s "https://status.claude.com/api/v2/incidents.json" \
            -o "data/snapshots/${TIMESTAMP}.json"

      - name: Fetch all pages and merge
        run: |
          python3 scripts/fetch_all_pages.py

      - name: Rebuild uptime
        run: |
          python3 scripts/build.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: archive $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
