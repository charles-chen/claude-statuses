<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Status — Uptime History</title>
  <meta name="description" content="Historical uptime tracking for Claude's API and services. See 90-day uptime percentages and recent incidents for claude.ai, the Claude API, Claude Code, and more.">
  <meta name="keywords" content="Claude uptime, Anthropic status, Claude API uptime, claude.ai status history">

  <!-- Open Graph -->
  <meta property="og:title" content="Claude Status — Uptime History">
  <meta property="og:description" content="Historical uptime tracking for Claude's API and services.">
  <meta property="og:url" content="https://charles-chen.github.io/claude-statuses/">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Claude Status — Uptime History">
  <meta name="twitter:description" content="Historical uptime tracking for Claude's API and services.">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* MD3 dark scheme — seeded from a blue-purple primary */
      --md-bg:           #0f0f13;
      --md-surface:      #1a1a21;
      --md-surface2:     #222230;
      --md-surface3:     #2a2a3a;
      --md-outline:      #44445a;
      --md-outline-var:  #2e2e42;
      --md-on-surface:   #e4e1f0;
      --md-on-surface2:  #c6c3d8;
      --md-on-surface3:  #8f8da8;

      /* tonal status colors — muted, not saturated */
      --md-green:        #6dd58c;
      --md-green-bg:     rgba(109,213,140,.12);
      --md-yellow:       #f5c518;
      --md-yellow-bg:    rgba(245,197,24,.1);
      --md-orange:       #ffb074;
      --md-orange-bg:    rgba(255,176,116,.1);
      --md-red:          #ff8a84;
      --md-red-bg:       rgba(255,138,132,.1);

      --md-primary:      #b0b3f4;
      --md-primary-bg:   rgba(176,179,244,.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--md-bg);
      color: var(--md-on-surface);
      font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    /* ---- header ---- */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3rem;
      gap: 1.5rem;
    }

    .site-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--md-on-surface);
      letter-spacing: -0.02em;
      font-family: 'Google Sans Display', 'Google Sans', sans-serif;
    }

    .site-meta {
      font-size: 0.8rem;
      color: var(--md-on-surface3);
      margin-top: 0.2rem;
    }

    .site-meta a {
      color: var(--md-primary);
      text-decoration: none;
    }
    .site-meta a:hover { text-decoration: underline; }

    .updated-badge {
      flex-shrink: 0;
      font-size: 0.72rem;
      color: var(--md-on-surface3);
      background: var(--md-surface2);
      border: 1px solid var(--md-outline-var);
      border-radius: 999px;
      padding: 0.3rem 1rem;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    /* ---- hero card ---- */
    .hero {
      background: var(--md-surface);
      border-radius: 28px;
      padding: 2rem 2.5rem 2rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--md-outline-var);
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .hero-eyebrow {
      font-size: 1rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--md-on-surface3);
      margin-bottom: 0.5rem;
    }

    .hero-pct {
      font-size: 4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      letter-spacing: -0.04em;
      font-family: 'Google Sans Display', 'Google Sans', sans-serif;
    }

    .hero-sublabel {
      font-size: 0.72rem;
      color: var(--md-on-surface3);
      margin-top: 0.5rem;
      letter-spacing: 0.04em;
    }

    .hero-stat-chip {
      text-align: center;
    }

    .hero-stat-chip .num {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--md-on-surface);
      display: block;
      line-height: 1.1;
    }

    .hero-stat-chip .lbl {
      font-size: 0.7rem;
      color: var(--md-on-surface3);
      letter-spacing: 0.02em;
    }

    /* ---- day bar ---- */
    .day-bar {
      display: flex;
      gap: 3px;
    }

    .day-sq {
      flex: 1;
      height: 36px;
      border-radius: 6px;
    }

    .day-sq.good     { background: var(--md-green);  opacity: 0.65; }
    .day-sq.none     { background: var(--md-outline); opacity: 0.3;  }
    .day-sq.minor    { background: var(--md-yellow);  opacity: 0.8;  }
    .day-sq.major    { background: var(--md-orange);  opacity: 0.85; }
    .day-sq.critical { background: var(--md-red);     opacity: 1;    }

    .day-bar-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
    }

    .day-bar-labels span {
      font-size: 0.68rem;
      color: var(--md-on-surface3);
      letter-spacing: 0.02em;
    }

    /* ---- component table ---- */
    .comp-card {
      background: var(--md-surface);
      border: 1px solid var(--md-outline-var);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .comp-table {
      width: 100%;
      border-collapse: collapse;
    }

    .comp-table thead th {
      padding: 0.9rem 1.5rem;
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--md-on-surface3);
      border-bottom: 1px solid var(--md-outline-var);
      text-align: left;
    }

    .comp-table thead th:last-child { text-align: right; }

    .comp-table tbody tr {
      border-bottom: 1px solid var(--md-outline-var);
      transition: background 0.15s;
    }

    .comp-table tbody tr:last-child { border-bottom: none; }
    .comp-table tbody tr:hover { background: var(--md-surface2); }

    .comp-table tbody td {
      padding: 1rem 1.5rem;
      vertical-align: middle;
    }

    .comp-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--md-on-surface);
    }

    .comp-pct {
      text-align: right;
      font-size: 0.9rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .green  { color: var(--md-green);  }
    .yellow { color: var(--md-yellow); }
    .orange { color: var(--md-orange); }
    .red    { color: var(--md-red);    }

    /* ---- incidents ---- */
    .incidents-label {
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--md-on-surface3);
      margin-bottom: 1rem;
    }

    .comp-section { margin-bottom: 1.5rem; }

    .comp-section-card {
      background: var(--md-surface);
      border: 1px solid var(--md-outline-var);
      border-radius: 20px;
      overflow: hidden;
    }

    .comp-section-name {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--md-on-surface3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.85rem 1.5rem;
      border-bottom: 1px solid var(--md-outline-var);
      background: var(--md-surface2);
    }

    .incident-list { list-style: none; }

    .incident-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid var(--md-outline-var);
      font-size: 0.85rem;
      transition: background 0.15s;
    }

    .incident-item:last-child { border-bottom: none; }
    .incident-item:hover { background: var(--md-surface2); }

    .incident-dot {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 0.4rem;
    }

    .incident-meta { flex: 1; min-width: 0; }

    .incident-name {
      font-weight: 500;
      color: var(--md-on-surface);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .incident-time {
      color: var(--md-on-surface3);
      font-size: 0.75rem;
      margin-top: 0.15rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .pill-green  { background: var(--md-green-bg);  color: var(--md-green);  }
    .pill-yellow { background: var(--md-yellow-bg); color: var(--md-yellow); }
    .pill-orange { background: var(--md-orange-bg); color: var(--md-orange); }
    .pill-red    { background: var(--md-red-bg);    color: var(--md-red);    }

    .no-incidents {
      font-size: 0.82rem;
      color: var(--md-on-surface3);
      padding: 1rem 1.5rem;
    }

    #loading, #error {
      padding: 5rem 2rem;
      text-align: center;
      color: var(--md-on-surface3);
    }

    #error { color: var(--md-red); }

    /* ---- footer ---- */
    .site-footer {
      margin-top: 4rem;
      font-size: 0.72rem;
      color: var(--md-on-surface3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .site-footer a { color: var(--md-on-surface3); text-decoration: underline; text-underline-offset: 3px; }
    .site-footer a:hover { color: var(--md-on-surface); }
  </style>
</head>
<body>
<div class="container">

  <header class="site-header">
    <div>
      <div class="site-title">Claude Status</div>
      <div class="site-meta">
        Uptime history from <a href="https://status.claude.com" target="_blank" rel="noopener">status.claude.com</a>.
        Inspired by <a href="https://mrshu.github.io/github-statuses/" target="_blank" rel="noopener">mrshu</a>.
      </div>
    </div>
    <div class="updated-badge" id="updated-at">Loading…</div>
  </header>

  <div id="loading">Loading…</div>
  <div id="error" style="display:none"></div>

  <div id="content" style="display:none">

    <div class="hero" id="hero">
      <div class="hero-top">
        <div class="hero-left">
          <div class="hero-eyebrow">Overall uptime</div>
          <div class="hero-pct" id="hero-pct">—</div>
          <div class="hero-sublabel">Last 90 days</div>
        </div>
        <div class="hero-stat-chip" id="hero-inc-count"></div>
      </div>
      <div class="day-bar" id="day-bar"></div>
      <div class="day-bar-labels">
        <span>90 days ago</span>
        <span>Today</span>
      </div>
    </div>

    <div class="comp-card">
      <table class="comp-table">
        <thead><tr><th>Component</th><th>Last 90 days</th></tr></thead>
        <tbody id="comp-list"></tbody>
      </table>
    </div>

    <div class="incidents-label">Recent incidents</div>
    <div id="incidents-list"></div>

  </div>

  <footer class="site-footer">
    <span>Data from <a href="https://status.claude.com/api/v2/incidents.json" target="_blank" rel="noopener">status.claude.com API</a> · archived hourly</span>
    <a href="https://github.com/charles-chen/claude-statuses" target="_blank" rel="noopener">View source</a>
  </footer>

</div>
<script>
  function colorClass(pct) {
    if (pct >= 99.9) return 'green';
    if (pct >= 99.0) return 'yellow';
    if (pct >= 95.0) return 'orange';
    return 'red';
  }

  function impactColor(impact) {
    const map = { critical: 'red', major: 'orange', minor: 'yellow', none: 'green' };
    return map[impact] || 'muted';
  }

  function fmtPct(pct) {
    return pct.toFixed(2) + '%';
  }

  function fmtDateShort(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('en-US', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
    });
  }

  function durationStr(startIso, endIso) {
    if (!startIso || !endIso) return null;
    const mins = Math.round((new Date(endIso) - new Date(startIso)) / 60000);
    if (mins < 60) return `${mins}m`;
    return `${(mins / 60).toFixed(1)}h`;
  }

  async function load() {
    try {
      const resp = await fetch('data/uptime.json');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      render(await resp.json());
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      const err = document.getElementById('error');
      err.style.display = 'block';
      err.textContent = `Failed to load uptime data: ${e.message}`;
    }
  }

  function render(data) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    const d = new Date(data.generated_at);
    document.getElementById('updated-at').textContent =
      'Updated ' + d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });

    if (data.aggregate) {
      const pct = data.aggregate['90d'];
      const el = document.getElementById('hero-pct');
      el.textContent = fmtPct(pct);
      el.className = 'hero-pct ' + colorClass(pct);
    }

    const totalInc = data.components.reduce((sum, c) => sum + (c.incidents ? c.incidents.length : 0), 0);
    document.getElementById('hero-inc-count').innerHTML =
      `<span class="num">${totalInc}</span><span class="lbl">incidents<br>last 90d</span>`;

    if (data.daily_overall) {
      const bar = document.getElementById('day-bar');
      data.daily_overall.forEach(status => {
        const sq = document.createElement('div');
        sq.className = 'day-sq ' + status;
        bar.appendChild(sq);
      });
    }

    const compList = document.getElementById('comp-list');
    for (const comp of data.components) {
      const pct = comp.uptime['90d'];
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="comp-name">${comp.name}</td>
        <td class="comp-pct ${colorClass(pct)}">${fmtPct(pct)}</td>
      `;
      compList.appendChild(tr);
    }

    const incidentsList = document.getElementById('incidents-list');
    for (const comp of data.components) {
      if (!comp.incidents || comp.incidents.length === 0) continue;

      const section = document.createElement('div');
      section.className = 'comp-section';

      const card = document.createElement('div');
      card.className = 'comp-section-card';

      const nameEl = document.createElement('div');
      nameEl.className = 'comp-section-name';
      nameEl.textContent = comp.name;
      card.appendChild(nameEl);

      const ul = document.createElement('ul');
      ul.className = 'incident-list';

      for (const inc of comp.incidents) {
        const col = impactColor(inc.impact);
        const dur = durationStr(inc.started_at, inc.resolved_at);
        const li = document.createElement('li');
        li.className = 'incident-item';

        const dot = document.createElement('div');
        dot.className = 'incident-dot';
        dot.style.background = `var(--md-${col})`;

        const meta = document.createElement('div');
        meta.className = 'incident-meta';

        const nameEl = document.createElement('div');
        nameEl.className = 'incident-name';
        nameEl.textContent = inc.name;

        const timeEl = document.createElement('div');
        timeEl.className = 'incident-time';

        const dateSpan = document.createElement('span');
        dateSpan.textContent = fmtDateShort(inc.started_at);
        timeEl.appendChild(dateSpan);

        if (dur) {
          const durSpan = document.createElement('span');
          durSpan.textContent = '· ' + dur;
          timeEl.appendChild(durSpan);
        }

        const impactPill = document.createElement('span');
        impactPill.className = `pill pill-${col}`;
        impactPill.textContent = inc.impact;
        timeEl.appendChild(impactPill);

        if (inc.status !== 'resolved') {
          const statusPill = document.createElement('span');
          statusPill.className = 'pill pill-yellow';
          statusPill.textContent = inc.status;
          timeEl.appendChild(statusPill);
        }

        meta.appendChild(nameEl);
        meta.appendChild(timeEl);
        li.appendChild(dot);
        li.appendChild(meta);
        ul.appendChild(li);
      }

      card.appendChild(ul);
      section.appendChild(card);
      incidentsList.appendChild(section);
    }
  }

  load();
</script>
</body>
</html>
